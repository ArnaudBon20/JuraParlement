<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Le Jura aux Chambres fédérales</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .login-shell {
      min-height: calc(100vh - 220px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 0;
    }

    .login-card {
      width: min(100%, 460px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 2rem;
    }

    .login-card h2 {
      margin-bottom: 0.75rem;
      color: var(--primary);
    }

    .login-card p {
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-button {
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 700;
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .login-button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .login-error {
      display: none;
      color: #b91c1c;
      background: #fee2e2;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
    }

    .login-error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="header-main">
        <h1><a href="login.html" style="color: inherit; text-decoration: none;">Le Jura aux Chambres fédérales</a></h1>
        <nav>
          <a href="login.html" class="active">Connexion</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container login-shell">
    <section class="login-card">
      <h2>Connexion</h2>
      <p>Connecte-toi avec Netlify Identity pour accéder au site.</p>
      <div class="login-actions">
        <button id="loginButton" class="login-button" type="button">Se connecter</button>
        <div id="loginError" class="login-error"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Données: <a href="https://ws-old.parlament.ch/" target="_blank">API du Parlement suisse</a></p>
      <p>Source: <a href="https://github.com/SwissParlMonitoring/Jura" target="_blank">GitHub</a></p>
    </div>
  </footer>

  <script>
    const loginButton = document.getElementById('loginButton');
    const loginError = document.getElementById('loginError');
    const currentHash = window.location.hash || '';
    const hasInviteToken = currentHash.includes('invite_token');
    const hasConfirmationToken = currentHash.includes('confirmation_token');
    const hasRecoveryToken = currentHash.includes('recovery_token');

    function showError(message) {
      loginError.textContent = message;
      loginError.classList.add('visible');
    }

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (user) {
          window.location.replace('/home.html');
        }
      });

      window.netlifyIdentity.on('login', () => {
        window.location.replace('/home.html');
      });

      window.netlifyIdentity.on('error', err => {
        showError(err && err.message ? err.message : 'La connexion Netlify Identity a échoué.');
      });

      window.netlifyIdentity.init();

      loginButton.addEventListener('click', () => {
        loginError.classList.remove('visible');
        window.netlifyIdentity.open('login');
      });

      if (hasInviteToken || hasConfirmationToken) {
        window.netlifyIdentity.open('signup');
      } else if (hasRecoveryToken) {
        window.netlifyIdentity.open('login');
      }
    } else {
      loginButton.disabled = true;
      showError('Le widget Netlify Identity ne s’est pas chargé. Vérifie que Netlify Identity est bien activé pour ce site.');
    }
  </script>
</body>
</html>

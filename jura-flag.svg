<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350">
  <!-- Fond blanc -->
  <rect width="350" height="350" fill="white"/>
  
  <!-- Bandes rouges côté droit -->
  <rect x="175" y="0" width="175" height="50" fill="#E8423F"/>
  <rect x="175" y="100" width="175" height="50" fill="#E8423F"/>
  <rect x="175" y="200" width="175" height="50" fill="#E8423F"/>
  <rect x="175" y="300" width="175" height="50" fill="#E8423F"/>
  
  <!-- Crosse de Bâle (stylisée) -->
  <path d="M90 30 
           C50 30, 30 60, 30 100 
           C30 140, 60 160, 90 160 
           C100 160, 105 155, 105 145
           C105 135, 95 130, 85 130
           C65 130, 55 115, 55 100
           C55 75, 70 55, 90 55
           C110 55, 125 75, 125 100
           C125 125, 110 145, 90 145
           L90 175
           L110 175
           L110 145
           C135 145, 150 120, 150 100
           C150 65, 125 30, 90 30Z" 
        fill="#E8423F" stroke="#333" stroke-width="1"/>
  
  <!-- Manche de la crosse -->
  <rect x="75" y="175" width="50" height="20" fill="#E8423F" stroke="#333" stroke-width="1"/>
  <rect x="80" y="195" width="40" height="100" fill="#E8423F" stroke="#333" stroke-width="1"/>
  
  <!-- Pointe en V -->
  <polygon points="80,295 100,350 120,295" fill="#E8423F" stroke="#333" stroke-width="1"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700">
  <!-- Fond blanc -->
  <rect width="700" height="700" fill="white"/>
  
  <!-- Bandes rouges côté droit (7 bandes alternées) -->
  <rect x="350" y="0" width="350" height="100" fill="#E54B4B"/>
  <rect x="350" y="200" width="350" height="100" fill="#E54B4B"/>
  <rect x="350" y="400" width="350" height="100" fill="#E54B4B"/>
  <rect x="350" y="600" width="350" height="100" fill="#E54B4B"/>
  
  <!-- Crosse de Bâle (côté gauche) -->
  <g transform="translate(175, 350)">
    <!-- Volute (spirale du haut) -->
    <path d="M0,-320 
             C-100,-320 -160,-260 -160,-160
             C-160,-60 -80,20 20,20
             C60,20 90,-10 90,-50
             C90,-90 60,-110 20,-110
             C-40,-110 -80,-70 -80,-20
             C-80,20 -50,50 0,50
             C30,50 50,30 50,0
             C50,-30 30,-50 0,-50" 
          fill="none" stroke="#E54B4B" stroke-width="45" stroke-linecap="round"/>
    
    <!-- Tige principale -->
    <rect x="-22" y="20" width="44" height="280" fill="#E54B4B"/>
    
    <!-- Anneau supérieur -->
    <rect x="-45" y="20" width="90" height="25" rx="5" fill="#E54B4B"/>
    <rect x="-40" y="50" width="80" height="20" rx="4" fill="#E54B4B"/>
    
    <!-- Pointe en V (bas) -->
    <polygon points="-22,300 0,350 22,300" fill="#E54B4B"/>
  </g>
  
  <!-- Contours fins -->
  <g fill="none" stroke="#333" stroke-width="2">
    <line x1="350" y1="0" x2="350" y2="700"/>
  </g>
</svg>
